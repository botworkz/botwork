name: Rust

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
    - run: cargo fmt --all -- --check
    # Verify Cargo.lock is consistent with the workspace manifests without
    # upgrading any dependencies.  Fails with an actionable message when the
    # committed lockfile is stale (e.g. after editing a Cargo.toml but
    # forgetting to regenerate the lock).
    - name: Verify Cargo.lock is up to date
      run: |
        cargo metadata --locked --format-version 1 >/dev/null || {
          echo "::error::Cargo.lock is out of date with Cargo.toml." \
               "Run 'cargo generate-lockfile' or 'cargo update --workspace'" \
               "locally and commit the result."
          exit 1
        }
    # `--workspace` covers every member, including ui/wasm.
    # The wasm crate compiles on the host (it's just a normal lib for
    # cargo fmt's purposes) — only its *runtime* needs wasm32.
    - run: cargo clippy --locked --workspace --all-targets -- -D warnings
    - run: cargo test --locked --workspace --all-targets
    # Explicit wasm32 build for ui/wasm so a regression in the
    # WASM-only dep tree (wasm-bindgen / web-sys / leptos csr) doesn't
    # sneak through the host-targeted checks above.
    - run: cargo build --locked -p botwork-ui-wasm --target wasm32-unknown-unknown

  deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: taiki-e/install-action@cargo-deny
    - name: cargo deny check
      run: cargo deny check

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@cargo-tarpaulin
    - name: Run coverage (unit tier — no docker)
      # All flags (engine, excludes, output format) live in tarpaulin.toml
      # at the workspace root so local runs and CI use identical settings.
      # Notes:
      #   * DOCKER_HOST points at a non-existent socket so any runtime
      #     docker-availability probe (e.g. api's testcontainers-backed
      #     integration tests) fails fast and those tests log-skip cleanly
      #     rather than causing the job to fail.
      #   * No --fail-under threshold is set — this run establishes the
      #     baseline. A maintainer will ratchet a floor in a later dedicated PR.
      env:
        DOCKER_HOST: unix:///nonexistent
      run: cargo tarpaulin
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage/
        if-no-files-found: error
