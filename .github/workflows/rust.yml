name: Rust

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
    - run: cargo fmt --all -- --check
    # `--workspace` covers every member, including ui/wasm.
    # The wasm crate compiles on the host (it's just a normal lib for
    # cargo fmt's purposes) — only its *runtime* needs wasm32.
    - run: cargo clippy --workspace --all-targets -- -D warnings
    - run: cargo test --workspace --all-targets
    # Explicit wasm32 build for ui/wasm so a regression in the
    # WASM-only dep tree (wasm-bindgen / web-sys / leptos csr) doesn't
    # sneak through the host-targeted checks above.
    - run: cargo build -p botwork-ui-wasm --target wasm32-unknown-unknown

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@cargo-tarpaulin
    - name: Run coverage (unit tier — no docker)
      # Notes:
      #   * Dev profile only — [profile.release] sets panic = "abort" which
      #     is incompatible with tarpaulin's LLVM instrumentation. Tarpaulin
      #     targets dev/test profile by default; do not add --release here.
      #   * botwork-ui-wasm is excluded because that crate only links against
      #     wasm32-unknown-unknown; a host-target build would hard-fail.
      #   * DOCKER_HOST points at a non-existent socket so any runtime
      #     docker-availability probe (e.g. api's testcontainers-backed
      #     integration tests) fails fast and those tests log-skip cleanly
      #     rather than causing the job to fail.
      #   * No --fail-under threshold is set here — this run establishes the
      #     baseline. A maintainer will ratchet a floor in a later dedicated PR.
      env:
        DOCKER_HOST: unix:///nonexistent
      run: |
        cargo tarpaulin \
          --engine llvm \
          --locked \
          --workspace \
          --all-targets \
          --exclude botwork-ui-wasm \
          --out Lcov \
          --out Xml \
          --output-dir coverage
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage/
        if-no-files-found: error
