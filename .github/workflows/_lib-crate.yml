# Reusable per-crate CI workflow for library and binary crates that do NOT
# ship a container image. Covers the standard per-crate gates:
#
#   cargo fmt -p <package> -- --check
#   cargo clippy -p <package> --all-targets --locked -- -D warnings
#   cargo test -p <package> --locked
#
# For crates that produce a release binary (produces-binary: true) it also
# runs `cargo build -p <package> --release --locked` and uploads the built
# binary as a `<package>-binary` artifact so the publish job can source it.
#
# Inputs:
#
#   * package         — cargo workspace package name (e.g. botwork-cli).
#   * binary          — name of the binary cargo produces under
#                       target/release/. Required when produces-binary is
#                       true; ignored otherwise.
#   * produces-binary — when true, runs a release build and uploads the
#                       binary as a <package>-binary artifact. Defaults to
#                       false.

name: Lib Crate

on:
  workflow_call:
    inputs:
      package:
        description: Cargo workspace package name (e.g. botwork-cli).
        required: true
        type: string
      binary:
        description: >-
          Name of the binary cargo produces under target/release/.
          Required when produces-binary is true; ignored otherwise.
        required: false
        type: string
        default: ''
      produces-binary:
        description: >-
          When true, runs a release build and uploads the binary as a
          <package>-binary artifact.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lib-crate:
    name: ${{ inputs.package }}
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: . -> target

    - name: cargo fmt, clippy, test
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cargo fmt -p "${PACKAGE}" -- --check
        cargo clippy -p "${PACKAGE}" --all-targets --locked -- -D warnings
        cargo test -p "${PACKAGE}" --locked

    - name: cargo build (release)
      if: inputs.produces-binary
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cargo build -p "${PACKAGE}" --release --locked

    - name: Upload release binary
      if: inputs.produces-binary
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.package }}-binary
        path: target/release/${{ inputs.binary }}
        if-no-files-found: error
