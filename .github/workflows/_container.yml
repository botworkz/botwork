# Reusable per-service container CI workflow.
#
# Called from .github/workflows/containers.yml as a matrix fan-out so each
# botwork container (session-broker, config-broker, control-plane, db-migrate,
# bootstrap, admin-api, admin-ui) gets its own runner. Background and motivation
# for the fan-out: see https://github.com/botworkz/botwork/issues/121.
#
# What this workflow does on one runner, for one service:
#
#   1. hadolint the per-service Dockerfile
#   2. install EarthBuild (so the Earthfile keeps being the single source of
#      truth for image build flags; the publish workflow stops touching it)
#   3. build the image via `earthly +<service>-image`
#   4. build any fixture images the smoke test needs (today: bootstrap and
#      admin-api both use db-migrate to land the schema before their own
#      assertions — see the `case` block under "Build fixture images")
#   5. run the service-specific smoke test from
#      `containers/<service>/smoke.sh` (line-for-line lift from the old
#      single-job containers.yml; one file per service so the surface is
#      discoverable next to the Dockerfile)
#   6. `docker save | gzip` the resulting `botwork/<service>:local` and
#      upload it as a workflow artifact named `<service>-image`, so that the
#      publish job in release.yml can consume the byte-identical image
#      instead of rebuilding (see RFE follow-up PR2).
#
# Inputs:
#   * service  — the directory name under containers/, also the image suffix
#                (e.g. "session-broker"). Used in:
#                  - `containers/<service>/Dockerfile` (hadolint target)
#                  - `containers/<service>/smoke.sh`   (smoke test)
#                  - `earthly +<service>-image`        (build target)
#                  - `botwork/<service>:local`         (built image tag)
#                  - `<service>-image`                 (artifact name)
#   * package  — the cargo workspace package the image wraps
#                (e.g. "botwork-session-broker"). Surfaced in the job summary
#                and reserved for forward-compat with a shared prebuilt-binary
#                workflow (see issue #121 open question 2); not used to invoke
#                cargo from this workflow today.

name: Container

on:
  workflow_call:
    inputs:
      service:
        description: >-
          Per-service identifier. Maps to containers/<service>/Dockerfile,
          containers/<service>/smoke.sh, the `+<service>-image` earthly
          target, and the `botwork/<service>:local` image tag.
        required: true
        type: string
      package:
        description: >-
          Cargo workspace package this container wraps
          (e.g. botwork-session-broker). Reserved for the prebuilt-binary
          follow-up; today only surfaced in the job summary.
        required: true
        type: string

permissions:
  contents: read

jobs:
  container:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # ── Per-service hadolint ────────────────────────────────────────────────
    # The old single-job workflow lint-walked every Dockerfile under
    # `containers/*/Dockerfile`. With the fan-out, each runner only lints
    # the file it's about to build — same coverage in aggregate, but the
    # lint failure now points at the same runner that did (or would have
    # done) the offending build.
    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        sudo curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        sudo chmod +x /usr/local/bin/hadolint
        hadolint --version

    - name: Lint Dockerfile
      run: |
        set -euo pipefail
        hadolint --failure-threshold error \
          "containers/${{ inputs.service }}/Dockerfile"

    # ── Build via earthly ───────────────────────────────────────────────────
    # The Earthfile stays the source of truth for the build flags
    # (`FROM DOCKERFILE --platform=linux/amd64 -f ... --build-arg GIT_SHA=...`)
    # so local-dev `earthly +images` and CI keep producing the same bytes.
    # Issue #121 floats moving CI to `docker buildx` directly as a follow-up;
    # this PR keeps earthly to make the matrix split a pure CI-shape change.
    - name: Install EarthBuild
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        base="https://github.com/EarthBuild/earthbuild/releases/download/v0.8.17"
        curl -fsSL -o "${tmp}/earth-linux-amd64" "${base}/earth-linux-amd64"
        curl -fsSL -o "${tmp}/checksum.asc" "${base}/checksum.asc"
        ( cd "${tmp}" && grep ' earth-linux-amd64$' checksum.asc | sha256sum -c - )
        sudo install -m 0755 "${tmp}/earth-linux-amd64" /usr/local/bin/earthly

    - name: Build ${{ inputs.service }}
      run: |
        set -euo pipefail
        # Platform is pinned in Earthfile via FROM DOCKERFILE --platform=linux/amd64.
        # We pass GIT_SHA so the image carries the canonical
        # `org.opencontainers.image.revision` label that the publish job
        # consumes when retagging. Today's release workflow re-bakes images
        # with --no-cache; once issue #121 PR2 lands, this is the *only*
        # place the SHA gets baked in, so the bytes CI tests are the bytes
        # that ship.
        earthly --build-arg GIT_SHA="${GITHUB_SHA}" \
          "+${{ inputs.service }}-image"

    # ── Build fixture images ────────────────────────────────────────────────
    # The bootstrap and admin-api smokes both land the schema via
    # `botwork/db-migrate:local` before exercising their own assertion
    # path — that's the production sequence (db-migrate.service runs
    # before bootstrap.service / admin-api.service in vm/).
    #
    # In the old single-job workflow this fell out for free because every
    # image was built in order on the same runner. With one runner per
    # service the bootstrap/admin-api runners have no db-migrate image
    # locally, so we build it explicitly as a fixture here.
    #
    # Cost: ~one extra cargo build per affected runner. Cheaper than
    # adding a `needs: [db-migrate]` chain (which would serialise the
    # bootstrap/admin-api builds behind a separate runner's network +
    # docker-load round trip) because the second cargo build on the
    # same runner reuses workspace-level compiler caches inside the
    # earthly buildkit instance.
    - name: Build fixture images
      run: |
        set -euo pipefail
        case "${{ inputs.service }}" in
          bootstrap|admin-api)
            # db-migrate as a smoke fixture. The bytes only need to satisfy
            # the smoke; we don't `docker save` this image and we don't
            # gate the release path on it (the dedicated db-migrate runner
            # is the source of truth for the published db-migrate image).
            earthly --build-arg GIT_SHA="${GITHUB_SHA}" +db-migrate-image
            ;;
        esac

    # ── Per-service smoke test ──────────────────────────────────────────────
    # Bodies live in `containers/<service>/smoke.sh` (one file per service).
    # No service-specific logic in this workflow; if a smoke needs a sidecar
    # postgres / a curl client / a network alias, the script owns it. This is
    # the only step that differs in shape across services so keeping the
    # workflow uniform keeps the per-runner failure mode obvious.
    - name: Smoke test ${{ inputs.service }}
      run: |
        set -euo pipefail
        bash "containers/${{ inputs.service }}/smoke.sh"

    # ── Save image as artifact for the publish job to consume ───────────────
    # `docker save | gzip` is well under the artifact size cap for our
    # distroless-based images (the largest is admin-ui at ~30 MiB compressed
    # because of the trunk bundle; the others land at ~15-20 MiB). Compression
    # keeps both the upload and the publish-side download fast.
    #
    # Retention is left at the repo default (90 days). The artifact is only
    # consumed by the publish job in the same workflow graph (a few minutes
    # later); we don't need to hold it longer.
    - name: Export image
      run: |
        set -euo pipefail
        mkdir -p .ci-images
        docker save "botwork/${{ inputs.service }}:local" \
          | gzip > ".ci-images/${{ inputs.service }}.tar.gz"
        ls -l ".ci-images/${{ inputs.service }}.tar.gz"

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.service }}-image
        path: .ci-images/${{ inputs.service }}.tar.gz
        if-no-files-found: error

    # ── Job summary ─────────────────────────────────────────────────────────
    # The matrix dashboard only shows the service name; surface the package
    # name and image tag in the per-job summary so a triager isn't guessing
    # which workspace member a failure points at.
    - name: Summarise
      if: always()
      run: |
        {
          echo "### Container: ${{ inputs.service }}"
          echo
          echo "| Field   | Value |"
          echo "|---------|-------|"
          echo "| service | \`${{ inputs.service }}\` |"
          echo "| package | \`${{ inputs.package }}\` |"
          echo "| image   | \`botwork/${{ inputs.service }}:local\` |"
          echo "| artifact| \`${{ inputs.service }}-image\` |"
        } >> "${GITHUB_STEP_SUMMARY}"
