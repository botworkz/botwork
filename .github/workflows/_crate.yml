# Reusable per-crate CI workflow.
#
# Called from .github/workflows/ci.yml as a matrix fan-out so each crate
# gets its own runner. Shared gates are always:
#
#   cargo fmt -p <package> -- --check
#   cargo clippy -p <package> --all-targets --locked -- -D warnings
#   cargo test -p <package> --locked
#
# Artifact behavior is controlled by one input:
#   - `artifact: none`      -> gates only, publish nothing
#   - `artifact: binary`    -> gates + release build + binary artifact upload
#   - `artifact: container` -> existing container/image/smoke/artifact path
#
# Modelled after botworkz/mcp-extra's `_crate.yml`:
#
#   * `Swatinem/rust-cache@v2` warms `~/.cargo/registry`, `~/.cargo/git`,
#     and the workspace `target/` across runs of this workflow. The cargo
#     step below uses that cached state by mounting `~/.cargo` and the
#     workspace into the per-crate `ci-tools` Docker image. `target/`
#     stays on the host so it survives across pushes.
#
#   * The per-crate Dockerfile is the single source of truth for what
#     this crate needs at runtime AND what its CI toolchain needs. Both
#     come from the same file: the `ci-tools` stage adds rustfmt/clippy
#     and any per-crate apt deps the tests need, the runtime stage takes
#     a prebuilt binary via `--build-arg BINARY_SOURCE=prebuilt`.
#
#   * The runtime image build is pure-COPY (no cargo runs), so the bytes
#     inside `botwork/<service>:local` are byte-identical to the binary
#     the cargo step just tested. The image is then `docker save`d and
#     uploaded as a `${service}-image` artifact so the `publish` job in
#     ci.yml can `docker load` it, retag with the VERSION + latest, and
#     push to GHCR — guaranteeing the bytes that smoke-tested here are
#     the bytes that ship. The round-1 label-revision verification step
#     that used to live in release.yml is structurally moot under this
#     shape and has been removed.
#
# Inputs:
#
#   * crate     — workspace-relative path to the crate dir that hosts
#                 the Dockerfile and smoke.sh. Drives:
#                   - `${crate}/Dockerfile` (hadolint + docker build)
#                   - `${crate}/smoke.sh`   (smoke test)
#                   - `.ci-prebuilt/${crate}/` (BINARY_SOURCE=prebuilt
#                     handoff path)
#                 For the simple crates this is the crate name on the
#                 workspace tree; for `db/migration` and `ui`
#                 (where the image covers two crates) it's the directory
#                 that owns the Dockerfile.
#   * service   — image suffix (`botwork/<service>:local`) and earthly
#                 target name. Differs from `crate` for `db/migration`
#                 (`db-migrate`); uniform for the rest.
#   * package   — cargo workspace package the image wraps
#                 (`botwork-session-broker`, …). Passed to `cargo fmt/
#                 clippy/test/build -p ${package}`.
#   * binary    — name of the executable cargo produces under
#                 `target/release/`. Usually identical to `package`
#                 (single-bin crates); declared explicitly anyway so
#                 the staging step is unambiguous.
#   * artifact  — one of:
#                   - none: gates only
#                   - binary: release binary artifact
#                   - container: existing image path
#   * needs-db-migrate
#               — whether the smoke test wants `botwork/db-migrate:local`
#                 present locally as a fixture. Today only `api`
#                 does; we build db-migrate via the `BINARY_SOURCE=source`
#                 path on the same runner because the per-crate matrix
#                 doesn't expose cross-job artifact reuse. Cheap enough
#                 because the in-Dockerfile cargo cache mounts (registry,
#                 git, target) keep the second build warm.

name: Crate

on:
  workflow_call:
    inputs:
      crate:
        description: >-
          Workspace-relative crate directory that owns the Dockerfile and
          smoke.sh (e.g. session-broker, db/migration, ui).
        required: true
        type: string
      service:
        description: >-
          Image suffix (`botwork/<service>:local`) and earthly target name.
        required: true
        type: string
      package:
        description: >-
          Cargo workspace package this image wraps (e.g. botwork-api).
        required: true
        type: string
      binary:
        description: >-
          Name of the binary cargo produces under `target/release/`.
          Usually identical to `package`. Required for artifact=binary
          and artifact=container.
        required: false
        type: string
        default: ''
      artifact:
        description: >-
          Artifact tail for this crate: none, binary, or container.
        required: true
        type: string
      needs-db-migrate:
        description: >-
          Build `botwork/db-migrate:local` on this runner before invoking
          the smoke test. Set true for smokes that land the schema via
          db-migrate first.
        required: false
        type: boolean
        default: false
      needs-docker:
        description: >-
          Mount the host docker socket and run the cargo test container
          on the host network so testcontainers-rs can spawn sidecar
          fixtures (e.g. postgres) visible to the in-container test
          process. Required for crates whose integration tests use
          `testcontainers::*` (today: api).
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  crate:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest
    env:
      SERVICE: ${{ inputs.service }}
      CRATE: ${{ inputs.crate }}
      PACKAGE: ${{ inputs.package }}
      BINARY: ${{ inputs.binary }}
      ARTIFACT: ${{ inputs.artifact }}
    steps:
    - uses: actions/checkout@v4

    - name: Validate artifact inputs
      run: |
        set -euo pipefail
        case "${ARTIFACT}" in
          none|binary|container) ;;
          *)
            echo "::error::artifact must be one of: none, binary, container"
            exit 1
            ;;
        esac
        if [ "${ARTIFACT}" != "none" ] && [ -z "${BINARY}" ]; then
          echo "::error::binary input is required when artifact=${ARTIFACT}"
          exit 1
        fi

    # ── Cross-run cargo cache ───────────────────────────────────────────────
    # `Swatinem/rust-cache@v2` keys on `Cargo.lock` + the host rust
    # toolchain, restores `~/.cargo/registry`, `~/.cargo/git`, and
    # `target/`. The cargo step below mounts those into the per-crate
    # ci-tools image so the warm host caches feed an in-container build.
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: . -> target

    - name: Install Rust toolchain (non-container)
      if: inputs.artifact != 'container'
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: cargo fmt, clippy, test (host)
      if: inputs.artifact != 'container'
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cargo fmt -p "${PACKAGE}" -- --check
        cargo clippy -p "${PACKAGE}" --all-targets --locked -- -D warnings
        cargo test -p "${PACKAGE}" --locked

    - name: cargo build (release)
      if: inputs.artifact == 'binary'
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cargo build -p "${PACKAGE}" --release --locked

    - name: Upload release binary artifact
      if: inputs.artifact == 'binary'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.package }}-binary
        path: target/release/${{ inputs.binary }}
        if-no-files-found: error

    - uses: docker/setup-buildx-action@v3
      if: inputs.artifact == 'container'

    # ── Build the per-crate ci-tools image ──────────────────────────────────
    # `--target ci-tools` plucks the toolchain stage out of the same
    # Dockerfile that produces the runtime image. Adding a test-time apt
    # dep or an extra rustup component is therefore a one-place change
    # in the crate's Dockerfile, not a workflow edit here.
    - name: Build containerized CI toolchain
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --load \
          --target ci-tools \
          -t "botwork/${SERVICE}:ci-tools" \
          -f "${CRATE}/Dockerfile" \
          .

    # ── Build/test/build the crate, host-side target dir ────────────────────
    # The docker invocation mirrors mcp-extra's `_crate.yml`: mount the
    # workspace at /work, the host cargo home at /cargo-home, and tell
    # cargo to write build artifacts to /work/target so they land back on
    # the host where rust-cache will persist them for the next run.
    #
    # Special-case for ui: trunk must populate
    # `ui/wasm/dist/` before the server's cargo build (the server
    # crate inlines that directory via `include_dir!`). The trunk step
    # runs inside the same container so the wasm32 target and the
    # trunk binary are guaranteed present.
    - name: cargo fmt, clippy, test, build (in container)
      if: inputs.artifact == 'container'
      env:
        NEEDS_DOCKER: ${{ inputs.needs-docker }}
      run: |
        set -euo pipefail
        mkdir -p "${HOME}/.cargo" "${RUNNER_TEMP}/container-home"
        trunk_prefix=""
        if [ "${SERVICE}" = "ui" ]; then
          # Trunk needs to land the wasm bundle into ui/wasm/dist/
          # before the server crate is compiled. Run it under the same
          # cargo home so the wasm crate's deps are populated in the
          # host's `~/.cargo/registry` cache.
          trunk_prefix='(cd ui/wasm && trunk build --release) && '
        fi

        # When tests use testcontainers-rs, plumb host docker access into
        # the cargo container and join the host network so get_host() +
        # get_host_port_ipv4() resolve to a reachable host-side port.
        docker_access_flags=""
        if [ "${NEEDS_DOCKER}" = "true" ]; then
          docker_sock_gid="$(stat -c %g /var/run/docker.sock)"
          docker_access_flags="--network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --group-add ${docker_sock_gid}"
        fi

        # shellcheck disable=SC2086
        docker run --rm \
          --platform linux/amd64 \
          --user "$(id -u):$(id -g)" \
          ${docker_access_flags} \
          -e HOME=/tmp/home \
          -e BOTWORK_GIT_SHA="${GITHUB_SHA}" \
          -e CARGO_HOME=/cargo-home \
          -e RUSTUP_HOME=/usr/local/rustup \
          -e CARGO_TARGET_DIR=/work/target \
          -v "${HOME}/.cargo:/cargo-home" \
          -v "${RUNNER_TEMP}/container-home:/tmp/home" \
          -v "${GITHUB_WORKSPACE}:/work" \
          -w /work \
          "botwork/${SERVICE}:ci-tools" \
          sh -elc "
            export PATH=/usr/local/cargo/bin:\$PATH
            ${trunk_prefix}cargo fmt -p ${PACKAGE} -- --check
            cargo clippy -p ${PACKAGE} --all-targets --locked -- -D warnings
            cargo test -p ${PACKAGE} --locked
            cargo build -p ${PACKAGE} --release --locked
          "

    # ── Per-crate hadolint ──────────────────────────────────────────────────
    # Lint the same Dockerfile we just built `ci-tools` from. A failure
    # here surfaces on the same runner that was about to publish the
    # image artifact, not on some separate `lint` job.
    - name: Install hadolint
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        sudo curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        sudo chmod +x /usr/local/bin/hadolint
        hadolint --version

    - name: Lint Dockerfile
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        hadolint --failure-threshold error "${CRATE}/Dockerfile"

    # ── Stage prebuilt binary for the runtime image ─────────────────────────
    # `.ci-prebuilt/${CRATE}/${BINARY}` is the path the `build-prebuilt`
    # stage of the per-crate Dockerfile COPYs from. Mirrors the layout
    # of the workspace so the `db/migration` case sits at
    # `.ci-prebuilt/db/migration/botwork-migration` and the simple cases
    # at `.ci-prebuilt/session-broker/botwork-session-broker` etc.
    - name: Stage prebuilt binary for Docker image
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        mkdir -p ".ci-prebuilt/${CRATE}"
        cp "target/release/${BINARY}" ".ci-prebuilt/${CRATE}/${BINARY}"

    # ── Build the runtime image from the prebuilt binary ────────────────────
    # `BINARY_SOURCE=prebuilt` skips the in-image cargo build entirely
    # and just COPYs the staged binary. The runtime image is therefore
    # byte-identical regardless of which BINARY_SOURCE branch produced
    # it; CI uses prebuilt because the binary was already built (and
    # tested) on the host.
    - name: Build ${{ inputs.service }} image
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t "botwork/${SERVICE}:local" \
          --build-arg BINARY_SOURCE=prebuilt \
          --build-arg "GIT_SHA=${GITHUB_SHA}" \
          --build-arg "BOTWORK_GIT_SHA=${GITHUB_SHA}" \
          --build-arg "BOTWORK_VERSION=$(tr -d '[:space:]' < VERSION)" \
          -f "${CRATE}/Dockerfile" \
          .

    # ── Build db-migrate as a fixture (api only today) ────────────────
    # The api smoke lands the schema before exercising its own
    # assertion path — the production sequence (db-migrate.service runs
    # before api.service on the vm). The round-1 workflow built
    # this via `earthly +db-migrate-image`; we use `docker buildx` with
    # `BINARY_SOURCE=source` so the in-Dockerfile cargo cache mounts
    # kick in. Cheap enough on a single runner; the canonical
    # db-migrate image artifact comes from the dedicated db-migrate
    # runner, not this fixture build.
    - name: Build db-migrate fixture image
      if: inputs.artifact == 'container' && inputs.needs-db-migrate
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t botwork/db-migrate:local \
          --build-arg BINARY_SOURCE=source \
          --build-arg "GIT_SHA=${GITHUB_SHA}" \
          --build-arg "BOTWORK_GIT_SHA=${GITHUB_SHA}" \
          --build-arg "BOTWORK_VERSION=$(tr -d '[:space:]' < VERSION)" \
          -f db/migration/Dockerfile \
          .

    # ── Per-crate smoke test ────────────────────────────────────────────────
    # Bodies live in `${crate}/smoke.sh`. No service-specific logic in
    # this workflow; if a smoke needs a sidecar postgres / a curl client
    # / a network alias, the script owns it.
    - name: Smoke test ${{ inputs.service }}
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        bash "${CRATE}/smoke.sh"

    # ── OCI labels ───────────────────────────────────────────────────────
    # Prove the three labels we promise to ship on every botwork image
    # are actually present on the bytes we just smoke-tested. The
    # release-version label MUST match `/VERSION` (trimmed); the revision
    # label MUST match `$GITHUB_SHA`; the source label is the repo URL.
    # All three are inspectable via `docker image inspect` without booting
    # the container — that's the point.
    - name: Verify OCI labels
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        image="botwork/${SERVICE}:local"
        expect_version="$(tr -d '[:space:]' < VERSION)"
        actual_version="$(docker image inspect "${image}" \
          --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
        actual_revision="$(docker image inspect "${image}" \
          --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
        actual_source="$(docker image inspect "${image}" \
          --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
        fail=0
        if [ "${actual_version}" != "${expect_version}" ]; then
          echo "::error::image.version label mismatch: expected '${expect_version}', got '${actual_version}'"
          fail=1
        fi
        if [ "${actual_revision}" != "${GITHUB_SHA}" ]; then
          echo "::error::image.revision label mismatch: expected '${GITHUB_SHA}', got '${actual_revision}'"
          fail=1
        fi
        if [ "${actual_source}" != "https://github.com/botworkz/botwork" ]; then
          echo "::error::image.source label mismatch: got '${actual_source}'"
          fail=1
        fi
        if [ "${fail}" -ne 0 ]; then
          exit 1
        fi
        echo "OCI labels OK: version=${actual_version} revision=${actual_revision:0:7} source=${actual_source}"

    # ── Save runtime image as artifact ──────────────────────────────────────
    # `docker save | gzip` the smoke-tested image so the publish job
    # in ci.yml can `docker load` exactly these bytes — no rebuild, no
    # round-trip to a registry, no possibility of label/cache drift.
    #
    # Artifact name keys on `service` (not `crate`) so `db-migrate-image`
    # sits at the top of the artifact list rather than at the nested
    # `db/migration-image` path. Publish job's `*-image` pattern picks
    # this up on filesystem ordering.
    #
    # Compression is meaningful here: the distroless images compress to
    # ~15-30 MiB (ui being the largest because of the trunk bundle).
    # Without gzip the upload + same-run download for publish would
    # serialise ~7 × ~50 MiB.
    - name: Save runtime image as artifact
      if: inputs.artifact == 'container'
      run: |
        set -euo pipefail
        mkdir -p .ci-images
        docker save "botwork/${SERVICE}:local" \
          | gzip > ".ci-images/${SERVICE}.tar.gz"
        ls -l ".ci-images/${SERVICE}.tar.gz"

    - name: Upload runtime image artifact
      if: inputs.artifact == 'container'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.service }}-image
        path: .ci-images/${{ inputs.service }}.tar.gz
        if-no-files-found: error

    # ── Upload binary artifact ──────────────────────────────────────────────
    # Kept for downstream tooling that wants a bare binary (e.g. vm-side
    # integration tests that don't want to docker-load a whole image).
    # The publish path uses the image artifact above instead.
    - name: Upload container binary artifact
      if: inputs.artifact == 'container'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.crate == 'db/migration' && 'db-migration' || inputs.crate }}-binary
        path: target/release/${{ inputs.binary }}
        if-no-files-found: error

    # ── Job summary ─────────────────────────────────────────────────────────
    # The matrix dashboard only shows `service`; surface crate/package/
    # binary in the per-job summary so a triager isn't guessing which
    # workspace member a failure points at.
    - name: Summarise
      if: always()
      run: |
        {
          echo "### Crate: ${SERVICE}"
          echo
          echo "| Field   | Value |"
          echo "|---------|-------|"
          echo "| crate   | \`${CRATE}\` |"
          echo "| service | \`${SERVICE}\` |"
          echo "| package | \`${PACKAGE}\` |"
          echo "| binary  | \`${BINARY}\` |"
          echo "| artifact | \`${ARTIFACT}\` |"
          if [ "${ARTIFACT}" = "container" ]; then
            echo "| image   | \`botwork/${SERVICE}:local\` |"
          fi
        } >> "${GITHUB_STEP_SUMMARY}"
