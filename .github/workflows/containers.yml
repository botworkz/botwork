# Per-crate container CI — fan-out orchestrator.
#
# Each crate that ships an image gets its own runner via the reusable
# workflow `.github/workflows/_crate.yml`. Same shape as
# botworkz/mcp-extra's `ci.yml`. See botworkz/botwork#125 for the
# motivation (round 2 of the CI restructure; round 1 was #122/#123,
# round 3 — fix `release.yml` to consume artifacts instead of rebuilding
# — is still open).
#
# Workspace-only crates (admin-core, db/entity, launcher, tools,
# admin-ui/wasm) stay covered by the workspace-wide `rust.yml`. The
# wasm32 build for `botwork-admin-ui-wasm` continues to live there too
# because admin-ui's per-crate runner only exercises the server side
# (wasm rebuild is invoked indirectly by trunk inside the ci-tools
# container).

name: Containers

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  containers:
    # One job per crate. `fail-fast: false` so a regression in one
    # smoke (e.g. control-plane changed its log line) doesn't mask a
    # genuinely independent failure in another crate — the parallel
    # split is only useful if every leaf gets to fail on its own merits.
    name: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        # `crate` is the workspace-relative directory that owns the
        # Dockerfile + smoke.sh; `service` is the image suffix
        # (`botwork/<service>:local`) and the Earthfile target name.
        # `package`/`binary` are the cargo names. For the simple cases
        # the four collapse, but we declare them explicitly so the
        # divergences for `db/migration` (image is `db-migrate`,
        # binary is `botwork-migration`) and `admin-ui` (image covers
        # both server and wasm crates, the package is the server)
        # are visible here rather than buried in `_crate.yml`.
        #
        # `needs-db-migrate` flags the two smokes that land the schema
        # via db-migrate before exercising their own assertion path;
        # the per-crate runner builds db-migrate from source as a
        # fixture in that case.
        include:
        - crate: session-broker
          service: session-broker
          package: botwork-session-broker
          binary: botwork-session-broker
        - crate: config-broker
          service: config-broker
          package: botwork-config-broker
          binary: botwork-config-broker
        - crate: control-plane
          service: control-plane
          package: botwork-control-plane
          binary: botwork-control-plane
        - crate: db/migration
          service: db-migrate
          package: botwork-migration
          binary: botwork-migration
        - crate: admin-api
          service: admin-api
          package: botwork-admin-api
          binary: botwork-admin-api
          needs-db-migrate: true
        - crate: admin-ui
          service: admin-ui
          package: botwork-admin-ui-server
          binary: botwork-admin-ui-server
    uses: ./.github/workflows/_crate.yml
    with:
      crate: ${{ matrix.crate }}
      service: ${{ matrix.service }}
      package: ${{ matrix.package }}
      binary: ${{ matrix.binary }}
      needs-db-migrate: ${{ matrix.needs-db-migrate || false }}
