# Container CI workflow — fan-out orchestrator.
#
# Each service builds on its own runner via the reusable workflow
# `.github/workflows/_container.yml`. Previous shape (one runner, seven
# sequential `earthly +<svc>-image` builds) is preserved as the single
# source of truth for what each smoke test does in
# `containers/<service>/smoke.sh`; this workflow only owns the matrix
# wiring. See https://github.com/botworkz/botwork/issues/121 for the
# motivation and the longer-term plan (publish reusing artifacts from
# here instead of rebuilding).

name: Containers

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  containers:
    # One job per service. `fail-fast: false` so a regression in one
    # smoke (e.g. control-plane changed its log line) doesn't mask a
    # genuinely independent failure in another container — the parallel
    # split is only useful if every leaf gets to fail on its own merits.
    name: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        # service ↔ package mapping mirrors Earthfile's `+<svc>-image`
        # targets and `Cargo.toml`'s workspace members. Keep this list in
        # lockstep with `containers/Makefile`'s `SERVICES :=` so local
        # `make -C containers tarballs` and CI build the same set.
        include:
        - service: session-broker
          package: botwork-session-broker
        - service: config-broker
          package: botwork-config-broker
        - service: control-plane
          package: botwork-control-plane
        - service: db-migrate
          package: botwork-migration
        - service: bootstrap
          package: botwork-bootstrap
        - service: admin-api
          package: botwork-admin-api
        - service: admin-ui
          package: botwork-admin-ui-server
    uses: ./.github/workflows/_container.yml
    with:
      service: ${{ matrix.service }}
      package: ${{ matrix.package }}
