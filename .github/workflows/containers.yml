name: Containers

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        sudo curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        sudo chmod +x /usr/local/bin/hadolint
        hadolint --version
    - name: Lint Dockerfiles
      run: |
        set -euo pipefail
        find containers -mindepth 2 -maxdepth 2 -name Dockerfile -print0 \
          | xargs -0 -n1 hadolint --failure-threshold error

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install EarthBuild
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        base="https://github.com/EarthBuild/earthbuild/releases/download/v0.8.17"
        curl -fsSL -o "${tmp}/earth-linux-amd64" "${base}/earth-linux-amd64"
        curl -fsSL -o "${tmp}/checksum.asc" "${base}/checksum.asc"
        ( cd "${tmp}" && grep ' earth-linux-amd64$' checksum.asc | sha256sum -c - )
        sudo install -m 0755 "${tmp}/earth-linux-amd64" /usr/local/bin/earthly
    - name: Build session-broker
      run: |
        set -euo pipefail
        # Platform is pinned in Earthfile via FROM DOCKERFILE --platform=linux/amd64.
        earthly +session-broker-image
    - name: Smoke test session-broker
      run: |
        set -euo pipefail
        # RFE #105 PR2: session-broker became a DB consumer. It now
        # fail-fasts on a missing BOTWORK_DATABASE_URL the same way
        # config-broker / bootstrap / admin-api do, so the container
        # smoke flips from "boot it and grep the bind log" to "boot
        # it without env and grep the fail-fast error" — the
        # symmetric shape config-broker's smoke uses.
        #
        # The "broker actually boots cleanly with a live DB" property
        # is covered by:
        #   * the cargo testcontainers suite under
        #     `session-broker/tests/agent_session_writethrough_test.rs`
        #     (postgres in a sidecar, full lifecycle assertions);
        #   * the vm/ integration suite where session-broker runs
        #     alongside a real postgres + launcher, and the goss
        #     check on `botwork-session-broker.service` proves the
        #     listener bind.
        #
        # We do NOT spin a postgres sidecar here because the broker
        # also needs a unix-socket launcher to be properly exercised,
        # and the launcher isn't shipped as a container image — it's
        # a host-side binary baked into vm/. Mocking it just to check
        # one log line would be a higher-flake surface than the
        # explicit-fail-fast check.
        output="$(docker run --rm botwork/session-broker:local 2>&1 || true)"
        echo "${output}"
        echo "${output}" | grep -q "BOTWORK_DATABASE_URL is not set"
    - name: Build config-broker
      run: |
        set -euo pipefail
        earthly +config-broker-image
    - name: Smoke test config-broker
      run: |
        set -euo pipefail
        # Post-RFE #101 PR2: config-broker reads from postgres at startup.
        # The fail-fast on no DB URL is the operator-visible signal that
        # the env-file plumbing didn't land — production CMD must surface
        # that as a non-zero exit, not a hung connect.
        output="$(docker run --rm botwork/config-broker:local 2>&1 || true)"
        echo "${output}"
        echo "${output}" | grep -q "BOTWORK_DATABASE_URL is not set"
    - name: Build control-plane
      run: |
        set -euo pipefail
        earthly +control-plane-image
    - name: Smoke test control-plane
      run: |
        set -euo pipefail
        # control-plane v0.1.8+ polls session-broker for a cold-start
        # recovery sync before binding (botworkz/botwork#87 / #81). In
        # the isolated container smoke there is no session-broker, so
        # the supported break-glass flag BOTWORK_CONTROL_PLANE_DISABLE_
        # RECOVERY=1 is set here. The recovery path itself is exercised
        # end-to-end by the vm/ integration suite where session-broker
        # actually exists; this step only proves the binary boots and
        # binds both 0.0.0.0:9300 (HTTP) and 0.0.0.0:9301 (xDS gRPC,
        # added in #91).
        #
        # Like session-broker, control-plane has no graceful-shutdown
        # handler so we mirror the detach + read-logs + force-rm shape
        # rather than using `timeout`. The trap fires regardless of how
        # the step ends so no container leaks into the runner.
        name="botwork-smoke-control-plane-$$"
        trap "docker rm -f ${name} >/dev/null 2>&1 || true" EXIT
        docker run -d --name "${name}" \
          -e BOTWORK_CONTROL_PLANE_DISABLE_RECOVERY=1 \
          botwork/control-plane:local >/dev/null
        sleep 3
        output="$(docker logs "${name}" 2>&1)"
        echo "${output}"
        echo "${output}" | grep -q "starting HTTP on 0.0.0.0:9300"
        echo "${output}" | grep -q "starting xDS gRPC on 0.0.0.0:9301"
    - name: Build db-migrate
      run: |
        set -euo pipefail
        earthly +db-migrate-image
    - name: Smoke test db-migrate
      run: |
        set -euo pipefail
        # End-to-end production-path proof for db-migrate (RFE 97):
        #   1. boot a fresh postgres on a throwaway docker network,
        #   2. run db-migrate against it via BOTWORK_DATABASE_URL,
        #   3. assert exit 0 (Migrator::up succeeds),
        #   4. assert the seaql_migrations tracking table exists,
        #   5. run db-migrate AGAIN and assert it still exits 0
        #      (idempotency — restart of the systemd oneshot is safe),
        #   6. confirm BOTWORK_DATABASE_URL unset surfaces a structured
        #      "MissingUrl" error and a non-zero exit (operator
        #      misconfig is fail-loud, not silent-success).
        #
        # We pin postgres:16-alpine here. It MUST match the tag used
        # by `db/migration/tests/migrate_smoke.rs` (POSTGRES_TAG) and
        # by the vm-baked shasset entry once the companion PR lands.
        # Drift between those three is exactly the class of bug this
        # smoke is here to catch.
        net="botwork-smoke-db-$$"
        pg="botwork-smoke-postgres-$$"
        trap "docker rm -f ${pg} >/dev/null 2>&1 || true; \
              docker network rm ${net} >/dev/null 2>&1 || true" EXIT
        docker network create "${net}" >/dev/null

        docker run -d --name "${pg}" \
          --network "${net}" --network-alias postgres \
          -e POSTGRES_USER=botwork \
          -e POSTGRES_PASSWORD=smoke \
          -e POSTGRES_DB=botwork \
          postgres:16-alpine >/dev/null

        # Wait for postgres to actually accept connections, not just for
        # the container to be up. `pg_isready` is shipped in the image.
        ready=0
        for _ in $(seq 1 30); do
          if docker exec "${pg}" pg_isready -U botwork -d botwork >/dev/null 2>&1; then
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "${ready}" -ne 1 ]]; then
          echo "postgres did not become ready in time" >&2
          docker logs "${pg}" >&2 || true
          exit 1
        fi

        # 1. + 2. + 3. — first up. Production CMD takes no args.
        out1="$(docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          botwork/db-migrate:local 2>&1)"
        echo "${out1}"
        echo "${out1}" | grep -q "migrations applied"

        # 4. — tracking table exists.
        table="$(docker exec "${pg}" psql -U botwork -d botwork -tAc \
          "SELECT to_regclass('public.seaql_migrations')")"
        if [[ "${table}" != "seaql_migrations" ]]; then
          echo "expected public.seaql_migrations after first up, got: '${table}'" >&2
          exit 1
        fi

        # 5. — idempotent re-run.
        out2="$(docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          botwork/db-migrate:local 2>&1)"
        echo "${out2}"
        echo "${out2}" | grep -q "migrations applied"

        # 6. — fail-loud on missing URL. We do NOT use `set -e` here; we
        # capture the exit code and check it explicitly so the error
        # message in the log is visible regardless.
        set +e
        docker run --rm botwork/db-migrate:local >misslog 2>&1
        miss_rc=$?
        set -e
        cat misslog
        if [[ "${miss_rc}" -eq 0 ]]; then
          echo "expected non-zero exit when BOTWORK_DATABASE_URL unset" >&2
          exit 1
        fi
        grep -q "BOTWORK_DATABASE_URL is not set" misslog

    - name: Build bootstrap
      run: |
        set -euo pipefail
        earthly +bootstrap-image
    - name: Smoke test bootstrap
      run: |
        set -euo pipefail
        # End-to-end production-path proof for bootstrap (RFE #101):
        #
        #   1. boot a fresh postgres on a throwaway docker network,
        #   2. land the schema via db-migrate (bootstrap depends on it),
        #   3. mount a minimal bootstrap.yaml into the bootstrap container
        #      and run it; assert exit 0,
        #   4. assert tenant/workspace/plugin/workspace_plugin rows are
        #      what the yaml says they should be,
        #   5. re-run bootstrap against the same DB and assert exit 0
        #      (idempotency — boot can restart safely),
        #   6. confirm BOTWORK_DATABASE_URL unset surfaces a structured
        #      error and a non-zero exit (operator misconfig is fail-loud).
        #
        # postgres pin must match db/migration/tests/migrate_smoke.rs and
        # the vm-baked shasset; drift between the three is exactly what
        # this smoke is here to catch.
        net="botwork-smoke-bootstrap-$$"
        pg="botwork-smoke-postgres-$$"
        cfg="${RUNNER_TEMP:-/tmp}/bootstrap.yaml"
        trap "docker rm -f ${pg} >/dev/null 2>&1 || true; \
              docker network rm ${net} >/dev/null 2>&1 || true; \
              rm -f ${cfg}" EXIT
        docker network create "${net}" >/dev/null

        docker run -d --name "${pg}" \
          --network "${net}" --network-alias postgres \
          -e POSTGRES_USER=botwork \
          -e POSTGRES_PASSWORD=smoke \
          -e POSTGRES_DB=botwork \
          postgres:16-alpine >/dev/null

        ready=0
        for _ in $(seq 1 30); do
          if docker exec "${pg}" pg_isready -U botwork -d botwork >/dev/null 2>&1; then
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "${ready}" -ne 1 ]]; then
          echo "postgres did not become ready in time" >&2
          docker logs "${pg}" >&2 || true
          exit 1
        fi

        docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          botwork/db-migrate:local >/dev/null

        cat > "${cfg}" <<'YAML'
        tenants:
        - name: phlax
          workspaces:
          - name: mcp
            plugins:
            - name: mcp-bash
              config:
                foo: bar
            - name: mcp-fetch

        plugins:
        - name: mcp-bash
          image: ghcr.io/example/mcp-bash:1.0
          egress: none
        - name: mcp-fetch
          image: ghcr.io/example/mcp-fetch:1.0
          egress:
            allow:
            - host: example.com
              ports: [443]
        YAML

        # 1. + 2. + 3. — first apply.
        out1="$(docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          -v "${cfg}:/etc/botwork/bootstrap.yaml:ro" \
          botwork/bootstrap:local 2>&1)"
        echo "${out1}"
        echo "${out1}" | grep -q "applied bootstrap from /etc/botwork/bootstrap.yaml"

        # 4. — sanity-check the row counts and the resolve-shape join.
        counts="$(docker exec "${pg}" psql -U botwork -d botwork -tA -c \
          "SELECT (SELECT count(*) FROM tenant) || ':' \
                  || (SELECT count(*) FROM workspace) || ':' \
                  || (SELECT count(*) FROM plugin) || ':' \
                  || (SELECT count(*) FROM workspace_plugin)")"
        if [[ "${counts}" != "1:1:2:2" ]]; then
          echo "expected 1:1:2:2 (tenant:workspace:plugin:wp), got: '${counts}'" >&2
          exit 1
        fi

        resolved="$(docker exec "${pg}" psql -U botwork -d botwork -tA -c \
          "SELECT p.image \
             FROM plugin p \
             JOIN workspace_plugin wp ON wp.plugin_id = p.id \
             JOIN workspace w ON w.id = wp.workspace_id \
             JOIN tenant t ON t.id = w.tenant_id \
             WHERE t.name='phlax' AND w.name='mcp' AND p.name='mcp-bash'")"
        if [[ "${resolved}" != "ghcr.io/example/mcp-bash:1.0" ]]; then
          echo "resolve query returned: '${resolved}'" >&2
          exit 1
        fi

        # 5. — idempotent re-run.
        out2="$(docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          -v "${cfg}:/etc/botwork/bootstrap.yaml:ro" \
          botwork/bootstrap:local 2>&1)"
        echo "${out2}"
        echo "${out2}" | grep -q "applied bootstrap from /etc/botwork/bootstrap.yaml"

        # 6. — fail-loud on missing URL.
        set +e
        docker run --rm \
          -v "${cfg}:/etc/botwork/bootstrap.yaml:ro" \
          botwork/bootstrap:local >misslog 2>&1
        miss_rc=$?
        set -e
        cat misslog
        if [[ "${miss_rc}" -eq 0 ]]; then
          echo "expected non-zero exit when BOTWORK_DATABASE_URL unset" >&2
          exit 1
        fi
        grep -q "BOTWORK_DATABASE_URL is not set" misslog

    - name: Build admin-api
      run: |
        set -euo pipefail
        earthly +admin-api-image
    - name: Smoke test admin-api
      run: |
        set -euo pipefail
        # End-to-end production-path proof for admin-api (RFE #106 PR1):
        #
        #   1. boot a fresh postgres on a throwaway docker network,
        #   2. land the schema via db-migrate (admin-api's health probe
        #      runs SELECT 1; it doesn't strictly need migrations, but
        #      production always has them — keep the test path honest),
        #   3. run admin-api on the same network with the DB URL set,
        #   4. curl /admin/api/v1/health from a sibling client container
        #      on the same network (the host has no published port —
        #      same trust-boundary posture as config-broker / control-
        #      plane), assert the response shape,
        #   5. confirm BOTWORK_DATABASE_URL unset surfaces a structured
        #      error and a non-zero exit (operator misconfig is fail-loud).
        #
        # postgres pin must match db/migration/tests/migrate_smoke.rs and
        # the vm-baked shasset; drift between the three is exactly what
        # this smoke is here to catch.
        net="botwork-smoke-admin-api-$$"
        pg="botwork-smoke-postgres-$$"
        api="botwork-smoke-admin-api-svc-$$"
        trap "docker rm -f ${api} >/dev/null 2>&1 || true; \
              docker rm -f ${pg} >/dev/null 2>&1 || true; \
              docker network rm ${net} >/dev/null 2>&1 || true" EXIT
        docker network create "${net}" >/dev/null

        docker run -d --name "${pg}" \
          --network "${net}" --network-alias postgres \
          -e POSTGRES_USER=botwork \
          -e POSTGRES_PASSWORD=smoke \
          -e POSTGRES_DB=botwork \
          postgres:16-alpine >/dev/null

        ready=0
        for _ in $(seq 1 30); do
          if docker exec "${pg}" pg_isready -U botwork -d botwork >/dev/null 2>&1; then
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "${ready}" -ne 1 ]]; then
          echo "postgres did not become ready in time" >&2
          docker logs "${pg}" >&2 || true
          exit 1
        fi

        docker run --rm --network "${net}" \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          botwork/db-migrate:local >/dev/null

        # 3. — start admin-api detached on the network with the alias
        # production uses. No --publish: the trust boundary is the
        # docker network, not a host port.
        docker run -d --name "${api}" \
          --network "${net}" --network-alias admin_api \
          -e BOTWORK_DATABASE_URL="postgres://botwork:smoke@postgres/botwork" \
          botwork/admin-api:local >/dev/null

        # Wait for the listener to bind. The startup log line is
        # `[admin-api] starting on 0.0.0.0:9400`; grep for it rather
        # than sleeping a fixed amount so a slow scheduler doesn't
        # flake the test.
        ready=0
        for _ in $(seq 1 30); do
          if docker logs "${api}" 2>&1 | grep -q "starting on 0.0.0.0:9400"; then
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "${ready}" -ne 1 ]]; then
          echo "admin-api did not bind in time" >&2
          docker logs "${api}" >&2 || true
          exit 1
        fi

        # 4. — hit /admin/api/v1/health from a sibling curl container.
        # We pin curl by digest-less tag (CI-only, throwaway) and use
        # --fail so a non-2xx surfaces as a non-zero exit. The body is
        # tiny JSON; check the two contract fields.
        body="$(docker run --rm --network "${net}" curlimages/curl:8.10.1 \
          --fail --silent --show-error \
          http://admin_api:9400/admin/api/v1/health)"
        echo "health body: ${body}"
        echo "${body}" | grep -q '"status":"ok"'
        echo "${body}" | grep -q '"db":"reachable"'

        # 5. — fail-loud on missing URL. Same shape as the other broker
        # smokes: capture exit, expect non-zero, expect the structured
        # error string in stderr.
        set +e
        docker run --rm botwork/admin-api:local >misslog 2>&1
        miss_rc=$?
        set -e
        cat misslog
        if [[ "${miss_rc}" -eq 0 ]]; then
          echo "expected non-zero exit when BOTWORK_DATABASE_URL unset" >&2
          exit 1
        fi
        grep -q "BOTWORK_DATABASE_URL is not set" misslog

    - name: Build admin-ui
      run: |
        set -euo pipefail
        earthly +admin-ui-image
    - name: Smoke test admin-ui
      run: |
        set -euo pipefail
        # End-to-end production-path proof for admin-ui (RFE #106
        # follow-up — Leptos control panel skeleton):
        #
        #   1. boot admin-ui on a throwaway docker network with the
        #      `admin_ui` alias production uses (no postgres, no
        #      db-migrate — admin-ui is a pure static-bundle server,
        #      it has no DB connection);
        #   2. curl /healthz from a sibling client container, assert
        #      the JSON contract field;
        #   3. curl /admin/ from a sibling client container, assert
        #      we get an HTML body containing the trunk-stamped
        #      marker string — this is the proof that the multi-
        #      stage Dockerfile actually ran `trunk build` and the
        #      include_dir! macro saw a populated dist/.
        #
        # No "fail-loud on missing URL" arm here because admin-ui
        # has no required env. The bind address has a default and
        # the bundle is baked into the binary.
        net="botwork-smoke-admin-ui-$$"
        ui="botwork-smoke-admin-ui-svc-$$"
        trap "docker rm -f ${ui} >/dev/null 2>&1 || true; \
              docker network rm ${net} >/dev/null 2>&1 || true" EXIT
        docker network create "${net}" >/dev/null

        docker run -d --name "${ui}" \
          --network "${net}" --network-alias admin_ui \
          botwork/admin-ui:local >/dev/null

        # Wait for the listener to bind. The startup log line is
        # `[admin-ui] starting on 0.0.0.0:9500`; grep for it rather
        # than sleeping a fixed amount so a slow scheduler doesn't
        # flake the test.
        ready=0
        for _ in $(seq 1 30); do
          if docker logs "${ui}" 2>&1 | grep -q "starting on 0.0.0.0:9500"; then
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "${ready}" -ne 1 ]]; then
          echo "admin-ui did not bind in time" >&2
          docker logs "${ui}" >&2 || true
          exit 1
        fi

        # 2. — /healthz.
        body="$(docker run --rm --network "${net}" curlimages/curl:8.10.1 \
          --fail --silent --show-error \
          http://admin_ui:9500/healthz)"
        echo "healthz body: ${body}"
        echo "${body}" | grep -q '"status":"ok"'

        # 3. — /admin/ should return the trunk-built shell, not 404.
        # We grep for the page <title> we set in admin-ui/wasm/index.html;
        # if the include_dir! bundle is empty this assertion fails
        # loudly rather than the more confusing "404 from the server".
        body="$(docker run --rm --network "${net}" curlimages/curl:8.10.1 \
          --fail --silent --show-error \
          http://admin_ui:9500/admin/)"
        echo "admin body bytes: $(printf '%s' "${body}" | wc -c)"
        echo "${body}" | grep -q "botwork admin"
        echo "${body}" | grep -q "data-trunk"

        # 4. — sub-resource path check. The bug this catches:
        # if Trunk.toml drops `public_url = "/admin/"`, trunk emits
        # `<link rel="modulepreload" href="/<hash>.js">` instead of
        # `<link rel="modulepreload" href="/admin/<hash>.js">`. In
        # the bare container the admin-ui server then 404s those
        # root-relative paths, and the browser surfaces it as
        # `NS_ERROR_CORRUPTED_CONTENT`. Through envoy (vm/space) the
        # same path 401s on ext_authz. Either way the panel is
        # broken in a way the existing "/admin/ returns HTML" check
        # doesn't see.
        #
        # We:
        #   a. parse the HTML for the wasm-bindgen JS loader URL
        #      (trunk emits it as `<link rel="modulepreload"
        #      href="...">`),
        #   b. assert the URL starts with `/admin/` — root-relative
        #      `/foo.js` is the specific failure mode this probe
        #      catches,
        #   c. curl it and assert 200 + a JS-ish content-type,
        #   d. do the same for the `.wasm` blob (preload href).
        js_url="$(printf '%s' "${body}" \
          | grep -oE 'href="[^"]+\.js"' \
          | head -1 \
          | sed -E 's/^href="([^"]+)"$/\1/')"
        if [[ -z "${js_url}" ]]; then
          echo "could not find a JS bundle href in /admin/ body" >&2
          printf '%s\n' "${body}" >&2
          exit 1
        fi
        echo "js_url: ${js_url}"
        case "${js_url}" in
          /admin/*) ;;
          *)
            echo "JS bundle href ${js_url} is not /admin/-prefixed" >&2
            echo "this means Trunk.toml lost public_url = \"/admin/\"" >&2
            exit 1
            ;;
        esac

        wasm_url="$(printf '%s' "${body}" \
          | grep -oE 'href="[^"]+\.wasm"' \
          | head -1 \
          | sed -E 's/^href="([^"]+)"$/\1/')"
        if [[ -z "${wasm_url}" ]]; then
          echo "could not find a wasm preload href in /admin/ body" >&2
          printf '%s\n' "${body}" >&2
          exit 1
        fi
        echo "wasm_url: ${wasm_url}"
        case "${wasm_url}" in
          /admin/*) ;;
          *)
            echo "wasm preload href ${wasm_url} is not /admin/-prefixed" >&2
            echo "this means Trunk.toml lost public_url = \"/admin/\"" >&2
            exit 1
            ;;
        esac

        # c. — JS loader must serve 200 + JS-ish content-type. We
        # use `curl -D` to capture headers separately from the body
        # because the JS payload is noisy in logs and we only care
        # about the contract here.
        hdrs="$(docker run --rm --network "${net}" curlimages/curl:8.10.1 \
          --fail --silent --show-error --dump-header - --output /dev/null \
          "http://admin_ui:9500${js_url}")"
        echo "JS headers:"
        printf '%s\n' "${hdrs}"
        printf '%s\n' "${hdrs}" \
          | tr -d '\r' \
          | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' \
          | grep -Eq '^(application/javascript|text/javascript)'

        # d. — wasm blob must serve 200 + application/wasm.
        hdrs="$(docker run --rm --network "${net}" curlimages/curl:8.10.1 \
          --fail --silent --show-error --dump-header - --output /dev/null \
          "http://admin_ui:9500${wasm_url}")"
        echo "wasm headers:"
        printf '%s\n' "${hdrs}"
        printf '%s\n' "${hdrs}" \
          | tr -d '\r' \
          | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' \
          | grep -q '^application/wasm$'
