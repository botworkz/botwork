name: Containers

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install hadolint
      run: |
        set -euo pipefail
        HADOLINT_VERSION=v2.12.0
        sudo curl -fsSL -o /usr/local/bin/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        sudo chmod +x /usr/local/bin/hadolint
        hadolint --version
    - name: Lint Dockerfiles
      run: |
        set -euo pipefail
        find containers -mindepth 2 -maxdepth 2 -name Dockerfile -print0 \
          | xargs -0 -n1 hadolint --failure-threshold error

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install EarthBuild
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        base="https://github.com/EarthBuild/earthbuild/releases/download/v0.8.17"
        curl -fsSL -o "${tmp}/earth-linux-amd64" "${base}/earth-linux-amd64"
        curl -fsSL -o "${tmp}/checksum.asc" "${base}/checksum.asc"
        ( cd "${tmp}" && grep ' earth-linux-amd64$' checksum.asc | sha256sum -c - )
        sudo install -m 0755 "${tmp}/earth-linux-amd64" /usr/local/bin/earthly
    - name: Build session-broker
      run: |
        set -euo pipefail
        # Platform is pinned in Earthfile via FROM DOCKERFILE --platform=linux/amd64.
        earthly +session-broker-image
    - name: Smoke test session-broker
      run: |
        set -euo pipefail
        # Pre-config-broker session-broker fail-fast asserted on a missing
        # plugins.yaml. After the cutover session-broker no longer reads
        # plugins.yaml at all (config-broker owns it), so a no-env-vars launch
        # starts cleanly and serves forever.
        #
        # `timeout` is the wrong tool here:
        #   1. it only sends SIGTERM by default, and session-broker has no
        #      graceful-shutdown handler — so `timeout` itself waits forever
        #      for the foreground `docker run` to return,
        #   2. even SIGKILL on the docker CLI does not stop the container —
        #      the container is owned by dockerd, the CLI is just attached.
        #
        # Instead: run detached, give it a beat to bind, read accumulated
        # stdout, and force-remove via trap. The trap fires regardless of
        # whether the grep passes, the assertion fails, or the job is
        # cancelled — so no container is leaked into the runner.
        name="botwork-smoke-session-broker-$$"
        trap "docker rm -f ${name} >/dev/null 2>&1 || true" EXIT
        docker run -d --name "${name}" botwork/session-broker:local >/dev/null
        sleep 3
        output="$(docker logs "${name}" 2>&1)"
        echo "${output}"
        echo "${output}" | grep -q "starting gRPC ext_proc service on 0.0.0.0:9001"
    - name: Build config-broker
      run: |
        set -euo pipefail
        earthly +config-broker-image
    - name: Smoke test config-broker
      run: |
        set -euo pipefail
        # config-broker refuses to start when plugins.yaml is missing.
        output="$(docker run --rm botwork/config-broker:local 2>&1 || true)"
        echo "${output}"
        echo "${output}" | grep -q "plugin registry file not found"
