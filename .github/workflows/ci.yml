# Top-level CI orchestrator.
#
# Three job groups, all in this one workflow so artifacts uploaded by
# any of them are reachable from the others via the same workflow run id:
#
#   1. `crates` — matrix fan-out over the single per-crate reusable workflow
#      `_crate.yml`. Every crate gets its own runner. All run the same
#      fmt/clippy/test gates; artifact tails differ by `artifact` type:
#      container -> existing image/smoke path, binary -> release binary
#      artifact, none -> gates + coverage only.
#
#   2. `coverage-aggregate` — downloads every per-crate `<crate>-coverage`
#      artifact and runs grcov to produce one repository-level lcov + html
#      report. No threshold gate yet; this is the baseline run.
#
#   3. `publish` — runs on `push` to main (or workflow_dispatch) with a
#      clean (non-`-dev`) VERSION. `needs: [crates]`, then
#      `download-artifact` → `docker load` → retag :VERSION + :latest
#      → `docker push` for the images, and `download-artifact` →
#      action-gh-release for the binaries. No rebuilds in publish: the
#      bytes shipped are the bytes crate jobs already tested.
#
# The bump-VERSION-after-release job has split into its own
# `bump.yml` (triggered by `release: [published]`) so this workflow's
# event surface stays clean (`push`, `pull_request`, `workflow_dispatch`).
# bump.yml writes a new `-dev` VERSION to main; that triggers this
# workflow's `publish` job, which short-circuits on the `-dev` suffix —
# completing the version loop.
#
# See botworkz/botwork#129 for the round-3 motivation (round 1 = #122/
# #123, round 2 = #125/#126; round 3 retires release.yml entirely).

name: CI

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event_name == 'pull_request'
      && github.event.pull_request.number
      || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  crates:
    # One job per crate. `fail-fast: false` so a regression in one
    # smoke (e.g. control-plane changed its log line) doesn't mask a
    # genuinely independent failure in another crate — the parallel
    # split is only useful if every leaf gets to fail on its own merits.
    name: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        # `crate` is the workspace-relative directory that owns the
        # Dockerfile + smoke.sh for container artifacts.
        # `service` is the image suffix (`botwork/<service>:local`) and
        # the matrix job / check display name. Keep it BARE (no botwork-
        # prefix) so job names read `api-core`, `ctl`, ... consistent
        # with the original per-crate pipelines. The botwork/ prefix
        # lives in the image tag path, not here.
        # `package`/`binary` are the cargo names. For the simple cases
        # the four collapse, but we declare them explicitly so the
        # divergences for `db/migration` (image is `db-migrate`,
        # binary is `botwork-migration`) and `ui` (image covers
        # both server and wasm crates, the package is the server)
        # are visible here rather than buried in `_crate.yml`.
        #
        # `needs-db-migrate` flags any smokes that land the schema
        # via db-migrate before exercising their own assertion path;
        # the per-crate runner builds db-migrate from source as a
        # fixture in that case.
        include:
        - crate: session-broker
          service: session-broker
          package: botwork-session-broker
          binary: botwork-session-broker
          artifact: container
        - crate: config-broker
          service: config-broker
          package: botwork-config-broker
          binary: botwork-config-broker
          artifact: container
        - crate: control-plane
          service: control-plane
          package: botwork-control-plane
          binary: botwork-control-plane
          artifact: container
        - crate: db/migration
          service: db-migrate
          package: botwork-migration
          binary: botwork-migration
          artifact: container
        - crate: api
          service: api
          package: botwork-api
          binary: botwork-api
          artifact: container
          needs-db-migrate: true
          needs-docker: true
        - crate: ui
          service: ui
          package: botwork-ui-server
          binary: botwork-ui-server
          artifact: container
        - crate: cli
          service: cli
          package: botwork-cli
          binary: bw
          artifact: binary
        - crate: launcher
          service: launcher
          package: botwork-launcher
          binary: botwork-launcher
          artifact: binary
        - crate: ctl
          service: ctl
          package: botwork-ctl
          binary: botctl
          artifact: binary
        - crate: api-core
          service: api-core
          package: botwork-api-core
          binary: ''
          artifact: none
        - crate: db/entity
          service: entity
          package: botwork-entity
          binary: ''
          artifact: none
        - crate: version
          service: version
          package: botwork-version
          binary: ''
          artifact: none
        - crate: ui/wasm
          service: ui-wasm
          package: botwork-ui-wasm
          binary: ''
          artifact: none
          wasm-target-check: true
        - crate: bootstrap
          service: bootstrap
          package: botwork-bootstrap
          binary: ''
          artifact: none
        - crate: opaque-handshake
          # Keep `service` populated for a uniform matrix/job-display shape
          # across artifact types; artifact=none skips all image behavior.
          service: opaque-handshake
          package: botwork-opaque-handshake
          binary: ''
          artifact: none
    uses: ./.github/workflows/_crate.yml
    with:
      crate: ${{ matrix.crate }}
      service: ${{ matrix.service }}
      package: ${{ matrix.package }}
      binary: ${{ matrix.binary }}
      artifact: ${{ matrix.artifact }}
      needs-db-migrate: ${{ matrix.needs-db-migrate || false }}
      needs-docker: ${{ matrix.needs-docker || false }}
      wasm-target-check: ${{ matrix.wasm-target-check || false }}

  coverage-aggregate:
    name: coverage-aggregate
    needs: [crates]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install lcov
      run: sudo apt-get install -y --no-install-recommends lcov
    - name: Download per-crate coverage artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-coverage'
        path: .ci-coverage
    - name: Merge per-crate lcov files
      run: |
        set -euo pipefail
        mkdir -p coverage/html
        # Collect per-crate lcov.info files downloaded by download-artifact@v4.
        # Layout: .ci-coverage/<crate-slug>-coverage/lcov.info (one per crate).
        # Each lcov is already scoped to that crate's own source (--keep-only in
        # _crate.yml) and paths are repo-relative (--prefix-dir in _crate.yml),
        # so no crate can be credited for coverage produced by another crate's tests.
        tracefile_args=()
        shopt -s nullglob
        for f in .ci-coverage/*-coverage/lcov.info; do
          tracefile_args+=(--add-tracefile "$f")
        done
        shopt -u nullglob
        if [ "${#tracefile_args[@]}" -eq 0 ]; then
          echo "::error::no per-crate lcov.info files were downloaded"
          exit 1
        fi
        # Merge all per-crate lcovs into one repo-level report.
        # No fail-under threshold yet (baseline run). Maintainer will ratchet
        # a floor in a dedicated follow-up once the baseline is stable.
        lcov "${tracefile_args[@]}" --output-file coverage/lcov.info
        if [ ! -s coverage/lcov.info ]; then
          echo "::error::aggregate coverage/lcov.info missing or empty"
          exit 1
        fi
        genhtml coverage/lcov.info --output-directory coverage/html
    - name: Report aggregate coverage
      run: |
        set -euo pipefail
        # Max file rows shown in the aggregate table before truncating.
        MAX_TABLE_FILES=60
        LCOV=coverage/lcov.info
        report="$(awk \
          -v max_rows="${MAX_TABLE_FILES}" \
          'BEGIN { n=0; tlf=0; tlh=0 }
          /^SF:/ { f=substr($0,4); clf=0; clh=0 }
          /^LF:/ { clf=substr($0,4)+0 }
          /^LH:/ { clh=substr($0,4)+0 }
          /^end_of_record/ {
            if (clf>0) {
              nm[n]=f; lf[n]=clf; lh[n]=clh
              tlf+=clf; tlh+=clh; n++
            }
          }
          END {
            pct=(tlf>0)?(tlh*100.0/tlf):0
            print "## Aggregate Coverage"
            print ""
            printf "**Total: %d/%d lines (%.1f%%)**\n\n",tlh,tlf,pct
            print "> Full HTML report is in the uploaded `coverage` artifact."
            print ""
            print "| File | Covered | Total | % |"
            print "|------|---------|-------|---|"
            rows=(n>max_rows)?max_rows:n
            for (i=0;i<rows;i++) {
              fp=(lf[i]>0)?(lh[i]*100.0/lf[i]):0
              printf "| %s | %d | %d | %.1f%% |\n",nm[i],lh[i],lf[i],fp
            }
            if (n>max_rows) {
              printf "\n_%d more files - download the `coverage` artifact._\n",n-max_rows
            }
          }' "${LCOV}")"
        echo "${report}"
        printf '%s\n' "${report}" >> "${GITHUB_STEP_SUMMARY}"
    - name: Upload aggregate coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage/
        if-no-files-found: error

  publish:
    # Runs only on `push` to main (or manual workflow_dispatch). On
    # pull_request this job is skipped entirely (crate + coverage jobs
    # still run, so PR feedback covers everything except the publish push).
    #
    # `needs:` ensures every crate has passed its own gates and uploaded
    # publish artifacts before we even read VERSION. The internal
    # `is_release` gate then
    # short-circuits the actual GHCR push and gh-release publication
    # when VERSION ends in `-dev`.
    #
    # The label-revision verification step that used to live here
    # (`refusing to push a release container whose provenance does not
    # match the triggering commit`) has been removed because it is
    # structurally moot under this shape — `docker load` of the artifact
    # produced by the same workflow run reads back exactly the bytes
    # that were smoke-tested. The `org.opencontainers.image.revision`
    # label is still baked in by `_crate.yml`'s
    # `--build-arg GIT_SHA=${GITHUB_SHA}`; we just don't re-verify it
    # because we never rebuild.
    name: publish
    needs: [crates]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
        || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags and releases, upload assets
      packages: write   # push images to GHCR

    steps:
    - uses: actions/checkout@v4

    # ── Read and validate the VERSION file ──────────────────────────────────
    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        raw="$(tr -d '[:space:]' < VERSION)"
        echo "version=${raw}" >> "$GITHUB_OUTPUT"
        # Exit cleanly (skip publish) when the version contains a hyphen
        # (i.e. any pre-release/dev suffix such as "-dev", "-beta1", "-rc2").
        # Only a bare "MAJOR.MINOR.PATCH" triggers a publish so that automated
        # bump commits never cause a double-release.
        #
        # A second guard checks whether the git tag v<VERSION> already exists
        # on the remote. A clean VERSION can sit on more than one commit (e.g.
        # a chore/docs push lands between the release-bump PR merge and the
        # post-release `-dev` bump, or workflow_dispatch is re-run on an
        # already-published tree). Without this check the publish steps would
        # silently overwrite existing container tags on GHCR and re-upload
        # binary assets to the existing GitHub Release — replacing previously
        # published bytes with bytes from a different, unrelated commit.
        if [[ "${raw}" == *-* ]]; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} contains a pre-release suffix — skipping publish."
        elif git ls-remote --tags origin "refs/tags/v${raw}" | grep -q .; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "Tag v${raw} already exists on remote — skipping publish to prevent overwrite."
        else
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} is a clean semver and tag v${raw} is new — proceeding with publish."
        fi

    # ── Log in to GHCR ──────────────────────────────────────────────────────
    - name: Log in to GHCR
      if: steps.version.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # ── Download the image artifacts uploaded by the matrix above ───────────
    # `download-artifact@v4` with `pattern: '*-image'` creates one
    # subdirectory per matched artifact under `.ci-images/`, so the
    # layout is `.ci-images/<service>-image/<service>.tar.gz`.
    - name: Download image artifacts
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        pattern: '*-image'
        path: .ci-images

    # ── docker load → retag → docker push, one image at a time ──────────────
    # We discover services from the filesystem so the matrix in
    # `crates` stays the single source of truth — adding a service
    # to the matrix is the only edit needed; this step picks it up
    # automatically.
    - name: docker load, retag, push
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        REPO_PREFIX="ghcr.io/botworkz/botwork"

        for dir in .ci-images/*-image; do
          svc="${dir##*/}"
          svc="${svc%-image}"
          tarball="${dir}/${svc}.tar.gz"
          if [ ! -f "${tarball}" ]; then
            echo "ERROR: expected ${tarball} (one .tar.gz per artifact)" >&2
            ls -la "${dir}" >&2 || true
            exit 1
          fi

          echo "::group::publish ${svc}"
          docker load -i "${tarball}"

          repo="${REPO_PREFIX}/${svc}"
          docker tag "botwork/${svc}:local" "${repo}:${VERSION}"
          docker tag "botwork/${svc}:local" "${repo}:latest"
          docker push "${repo}:${VERSION}"
          docker push "${repo}:latest"
          echo "::endgroup::"
        done

    # ── Binaries: consume the prebuilt per-crate binary artifacts ───────────
    - name: Download launcher binary
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        name: botwork-launcher-binary
        path: .ci-binaries

    - name: Download botctl binary
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        name: botwork-ctl-binary
        path: .ci-binaries

    - name: Download bw binary
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        name: botwork-cli-binary
        path: .ci-binaries

    # ── GitHub Release: create + upload assets ──────────────────────────────
    # `softprops/action-gh-release` creates the tag and release in one
    # step. Overwrite protection is provided by the tag-existence check
    # in the `Read VERSION` step above; by the time this step runs the
    # tag is guaranteed not to exist yet.
    - name: Create GitHub Release
      if: steps.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        fail_on_unmatched_files: true
        files: |
          .ci-binaries/botwork-launcher
          .ci-binaries/botctl
          .ci-binaries/bw
