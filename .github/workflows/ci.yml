# Top-level CI orchestrator.
#
# Three job groups, all in this one workflow so artifacts uploaded by
# any of them are reachable from the others via the same workflow run id:
#
#   1. `crates` ‚Äî matrix fan-out over the single per-crate reusable workflow
#      `_crate.yml`. Every crate gets its own runner. All run the same
#      fmt/clippy/test gates; artifact tails differ by `artifact` type:
#      container -> existing image/smoke path, binary -> release binary
#      artifact, none -> no publish artifact.
#
#   2. `release-binaries` ‚Äî builds the launcher + tools release binaries
#      that ride into the GitHub Release. Same rust-cache key as
#      `rust.yml` is fine; separate job because release-profile builds
#      live under a different `target/` subdirectory.
#
#   3. `publish` ‚Äî runs on `push` to main (or workflow_dispatch) with a
#      clean (non-`-dev`) VERSION. `needs: [crates, release-binaries]`,
#      then `download-artifact` ‚Üí `docker load` ‚Üí retag :VERSION + :latest
#      ‚Üí `docker push` for the images, and `download-artifact` ‚Üí
#      action-gh-release for the binaries. No cargo. No earthly. No
#      `--no-cache`. The bytes pushed to GHCR are the bytes CI smoke-
#      tested.
#
# Workspace-only crates that are not yet wired into per-crate CI here
# (api-core, db/entity, launcher, tools, ui/wasm) stay covered by the
# workspace-wide `rust.yml`; the explicit wasm32 build for
# `botwork-ui-wasm` lives there too.
#
# The bump-VERSION-after-release job has split into its own
# `bump.yml` (triggered by `release: [published]`) so this workflow's
# event surface stays clean (`push`, `pull_request`, `workflow_dispatch`).
# bump.yml writes a new `-dev` VERSION to main; that triggers this
# workflow's `publish` job, which short-circuits on the `-dev` suffix ‚Äî
# completing the version loop.
#
# See botworkz/botwork#129 for the round-3 motivation (round 1 = #122/
# #123, round 2 = #125/#126; round 3 retires release.yml entirely).

name: CI

on:
  push:
    branches: [main, botwork-import]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event_name == 'pull_request'
      && github.event.pull_request.number
      || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  crates:
    # One job per crate. `fail-fast: false` so a regression in one
    # smoke (e.g. control-plane changed its log line) doesn't mask a
    # genuinely independent failure in another crate ‚Äî the parallel
    # split is only useful if every leaf gets to fail on its own merits.
    name: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        # `crate` is the workspace-relative directory that owns the
        # Dockerfile + smoke.sh; `service` is the image suffix
        # (`botwork/<service>:local`) and the Earthfile target name.
        # `package`/`binary` are the cargo names. For the simple cases
        # the four collapse, but we declare them explicitly so the
        # divergences for `db/migration` (image is `db-migrate`,
        # binary is `botwork-migration`) and `ui` (image covers
        # both server and wasm crates, the package is the server)
        # are visible here rather than buried in `_crate.yml`.
        #
        # `needs-db-migrate` flags any smokes that land the schema
        # via db-migrate before exercising their own assertion path;
        # the per-crate runner builds db-migrate from source as a
        # fixture in that case.
        include:
        - crate: session-broker
          service: session-broker
          package: botwork-session-broker
          binary: botwork-session-broker
          artifact: container
        - crate: config-broker
          service: config-broker
          package: botwork-config-broker
          binary: botwork-config-broker
          artifact: container
        - crate: control-plane
          service: control-plane
          package: botwork-control-plane
          binary: botwork-control-plane
          artifact: container
        - crate: db/migration
          service: db-migrate
          package: botwork-migration
          binary: botwork-migration
          artifact: container
        - crate: api
          service: api
          package: botwork-api
          binary: botwork-api
          artifact: container
          needs-db-migrate: true
          needs-docker: true
        - crate: ui
          service: ui
          package: botwork-ui-server
          binary: botwork-ui-server
          artifact: container
        - crate: cli
          service: botwork-cli
          package: botwork-cli
          binary: bw
          artifact: binary
        - crate: opaque-handshake
          # Keep `service` populated for a uniform matrix/job-display shape
          # across artifact types; artifact=none skips all image behavior.
          service: botwork-opaque-handshake
          package: botwork-opaque-handshake
          binary: ''
          artifact: none
    uses: ./.github/workflows/_crate.yml
    with:
      crate: ${{ matrix.crate }}
      service: ${{ matrix.service }}
      package: ${{ matrix.package }}
      binary: ${{ matrix.binary }}
      artifact: ${{ matrix.artifact }}
      needs-db-migrate: ${{ matrix.needs-db-migrate || false }}
      needs-docker: ${{ matrix.needs-docker || false }}

  release-binaries:
    # `botwork-launcher` and `botwork-tools` ride into the GitHub Release
    # as binary assets. Today they are recompiled inside `release.yml`'s
    # publish job on every release push; this PR moves the build into CI
    # so the binaries attached to the Release are the same bytes that the
    # `cargo test` here exercised.
    #
    # `bw` (botwork-cli) is built by the `crates` job above, which
    # uploads it as the `botwork-cli-binary` artifact. The `publish` job
    # downloads both artifacts and attaches all three to the GitHub Release.
    #
    # Separate job from `rust.yml` rather than inline because:
    #
    #   * `rust.yml` runs `cargo test --workspace --all-targets` in dev
    #     profile; this is release profile. Different `target/` subdirs,
    #     cleaner to keep them apart so dev-profile builds don't
    #     invalidate release-profile artifacts.
    #
    #   * `publish` does `needs: [crates, release-binaries]` ‚Äî
    #     all have to live in the same workflow file for `needs:` to reach them.
    name: release-binaries
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Build launcher + tools (release)
      env:
        BOTWORK_GIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cargo build --release --locked -p botwork-launcher -p botwork-tools

    - name: Upload release binaries
      uses: actions/upload-artifact@v4
      with:
        name: release-binaries
        path: |
          target/release/botwork-launcher
          target/release/botwork-tools
        if-no-files-found: error

  publish:
    # Runs only on `push` to main (or manual workflow_dispatch). On
    # pull_request this job is skipped entirely (the matrix + release-
    # binaries still run, so PR feedback covers everything except the
    # publish push).
    #
    # `needs:` ensures every container's smoke passed, the release
    # binaries are present on disk, and the crate builds (including
    # the `bw` binary artifact from botwork-cli) have completed before
    # we even read VERSION. The internal `is_release` gate then
    # short-circuits the actual GHCR push and gh-release publication
    # when VERSION ends in `-dev`.
    #
    # The label-revision verification step that used to live here
    # (`refusing to push a release container whose provenance does not
    # match the triggering commit`) has been removed because it is
    # structurally moot under this shape ‚Äî `docker load` of the artifact
    # produced by the same workflow run reads back exactly the bytes
    # that were smoke-tested. The `org.opencontainers.image.revision`
    # label is still baked in by `_crate.yml`'s
    # `--build-arg GIT_SHA=${GITHUB_SHA}`; we just don't re-verify it
    # because we never rebuild.
    name: publish
    needs: [crates, release-binaries]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
        || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags and releases, upload assets
      packages: write   # push images to GHCR

    steps:
    - uses: actions/checkout@v4

    # ‚îÄ‚îÄ Read and validate the VERSION file ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - name: Read VERSION
      id: version
      run: |
        set -euo pipefail
        raw="$(tr -d '[:space:]' < VERSION)"
        echo "version=${raw}" >> "$GITHUB_OUTPUT"
        # Exit cleanly (skip publish) when the version contains a hyphen
        # (i.e. any pre-release/dev suffix such as "-dev", "-beta1", "-rc2").
        # Only a bare "MAJOR.MINOR.PATCH" triggers a publish so that automated
        # bump commits never cause a double-release.
        #
        # A second guard checks whether the git tag v<VERSION> already exists
        # on the remote. A clean VERSION can sit on more than one commit (e.g.
        # a chore/docs push lands between the release-bump PR merge and the
        # post-release `-dev` bump, or workflow_dispatch is re-run on an
        # already-published tree). Without this check the publish steps would
        # silently overwrite existing container tags on GHCR and re-upload
        # binary assets to the existing GitHub Release ‚Äî replacing previously
        # published bytes with bytes from a different, unrelated commit.
        if [[ "${raw}" == *-* ]]; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} contains a pre-release suffix ‚Äî skipping publish."
        elif git ls-remote --tags origin "refs/tags/v${raw}" | grep -q .; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "Tag v${raw} already exists on remote ‚Äî skipping publish to prevent overwrite."
        else
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "VERSION=${raw} is a clean semver and tag v${raw} is new ‚Äî proceeding with publish."
        fi

    # ‚îÄ‚îÄ Log in to GHCR ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - name: Log in to GHCR
      if: steps.version.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # ‚îÄ‚îÄ Download the image artifacts uploaded by the matrix above ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    # `download-artifact@v4` with `pattern: '*-image'` creates one
    # subdirectory per matched artifact under `.ci-images/`, so the
    # layout is `.ci-images/<service>-image/<service>.tar.gz`.
    - name: Download image artifacts
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        pattern: '*-image'
        path: .ci-images

    # ‚îÄ‚îÄ docker load ‚Üí retag ‚Üí docker push, one image at a time ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    # We discover services from the filesystem so the matrix in
    # `containers` stays the single source of truth ‚Äî adding a service
    # to the matrix is the only edit needed; this step picks it up
    # automatically.
    - name: docker load, retag, push
      if: steps.version.outputs.is_release == 'true'
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        REPO_PREFIX="ghcr.io/botworkz/botwork"

        for dir in .ci-images/*-image; do
          svc="${dir##*/}"
          svc="${svc%-image}"
          tarball="${dir}/${svc}.tar.gz"
          if [ ! -f "${tarball}" ]; then
            echo "ERROR: expected ${tarball} (one .tar.gz per artifact)" >&2
            ls -la "${dir}" >&2 || true
            exit 1
          fi

          echo "::group::publish ${svc}"
          docker load -i "${tarball}"

          repo="${REPO_PREFIX}/${svc}"
          docker tag "botwork/${svc}:local" "${repo}:${VERSION}"
          docker tag "botwork/${svc}:local" "${repo}:latest"
          docker push "${repo}:${VERSION}"
          docker push "${repo}:latest"
          echo "::endgroup::"
        done

    # ‚îÄ‚îÄ Binaries: ride the same-run release-binaries and crates artifacts ‚îÄ
    - name: Download release binaries
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        name: release-binaries
        path: .ci-binaries

    # `bw` is built by the `crates / botwork-cli` job and uploaded as
    # the `botwork-cli-binary` artifact. Download it alongside the other
    # release binaries so all three ship as a single `files:` block below.
    - name: Download bw binary
      if: steps.version.outputs.is_release == 'true'
      uses: actions/download-artifact@v4
      with:
        name: botwork-cli-binary
        path: .ci-binaries

    # ‚îÄ‚îÄ GitHub Release: create + upload assets ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    # `softprops/action-gh-release` creates the tag and release in one
    # step. Overwrite protection is provided by the tag-existence check
    # in the `Read VERSION` step above; by the time this step runs the
    # tag is guaranteed not to exist yet.
    - name: Create GitHub Release
      if: steps.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        fail_on_unmatched_files: true
        files: |
          .ci-binaries/botwork-launcher
          .ci-binaries/botwork-tools
          .ci-binaries/bw
