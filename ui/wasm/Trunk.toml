# Trunk configuration for botwork-ui-wasm.
#
# Build:  trunk build --release
# Dev:    trunk serve            (live-reloads in the browser)
#
# Output is written to `dist/` (gitignored). The botwork-ui-server
# crate embeds `dist/` verbatim via `include_dir!`, so the production
# image is "trunk build then cargo build then distroless" with no
# filesystem dependency at runtime.

[build]
target = "index.html"
dist = "dist"

# `public_url` is the URL prefix trunk stamps into every reference in
# the rendered `index.html` — the wasm-bindgen JS loader, the `.wasm`
# preload, any `data-trunk` CSS/font/asset.
#
# After botworkz/space#311 Phase 2 the SPA mounts at `/` and entity
# pages live under `/{tenant}/*` with the login page at `/login`.
# Trunk-emitted asset references need their own URL space so they
# don't collide with the `/{tenant}/*` catch-all in either the ui
# server or the ingress envoy. `/static/*` is that space.
#
# Three places must agree on this prefix:
#
#   * `public_url` here (trunk-stamped hrefs),
#   * the `GET /static/*rest` route in `ui/server/src/handler.rs`
#     (where the bundle is served from),
#   * the `/static/*` route in the ingress envoy (lives in
#     `botworkz/space`).
#
# `ui/smoke.sh` asserts the `/static/` prefix on every rendered
# asset href; if you change this string, change it there too.
#
# In the local dev loop (`trunk serve`) trunk serves the bundle at
# `/static/...` from its own listener, the proxy below forwards
# `/api/*` to the local api, and the loop matches production exactly.
public_url = "/static/"

[serve]
# Listen on loopback only — dev convenience, never exposed to the LAN.
address = "127.0.0.1"
port = 8080

# Proxy /api/* to a locally-running api binary so the dev loop is
# "cargo run -p botwork-api in one terminal, trunk serve in another,
# open http://127.0.0.1:8080/." No CORS, no docker.
[[proxy]]
backend = "http://127.0.0.1:9400/api/"
rewrite = "/api/"

[[hooks]]
stage = "pre_build"
command = "tailwindcss"
command_arguments = [
  "-i",
  "input.css",
  "-o",
  "tailwind.css",
  "--minify",
]
