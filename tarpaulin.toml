# Tarpaulin configuration for local coverage runs.
#
# Usage:
#   cargo tarpaulin          # picks up this file automatically
#   make coverage            # equivalent via the Makefile target
#
# Notes:
#   * engine = "llvm" — matches CI and the other botworkz repos.
#   * Dev profile only — [profile.release] sets panic = "abort" which
#     is incompatible with LLVM instrumentation. Do not add
#     release = true here.
#   * botwork-ui-wasm is excluded because it only links against
#     wasm32-unknown-unknown; a host-target build hard-fails.
#   * No fail-under threshold is set — this establishes the baseline.
#     A maintainer will ratchet a floor in a later dedicated PR.
#
# Excluded from coverage denominator (exclude-files):
#   * db/entity/src/* — SeaORM #[derive(DeriveEntityModel)] generated
#     entity models (tenant, workspace, plugin, lease, agent_session,
#     session_worker, opaque_password_file, plugin_image_facet,
#     workspace_plugin, connection).  These are macro-expanded glue
#     with no meaningful branch logic to unit-test.
#   * db/migration/src/* — migration definitions (lib.rs, main.rs, and
#     every m2026*.rs).  Migrations run only against a live database via
#     the migration runner; they are exercised by integration/CI steps,
#     not unit tests.
#   * */main.rs — process-bootstrap entry points across the workspace
#     binaries (api, session-broker, control-plane, config-broker,
#     db/migration, botwork-cli, launcher, ui/server).  These
#     files contain only arg-parsing shell, tokio-runtime setup, and
#     server bind/serve wiring that is not meaningfully unit-testable.
#
# CI coverage path uses grcov with --ignore flags instead of tarpaulin.
# The two exclusion lists MUST be kept in sync. The grcov --ignore list
# lives in:
#   .github/workflows/_crate.yml  (per-crate grcov step)
#   .github/workflows/ci.yml      (aggregate grcov step)
# Note: this file lists ui/wasm/src/api.rs and ui/wasm/src/pages/mod.rs
# individually because botwork-ui-wasm is wholly excluded via the
# `exclude` key above; the CI grcov lists use the broader ui/wasm/src/*
# glob which subsumes those specific files — the net excluded set is
# equivalent.

[default]
engine = "Llvm"
locked = true
workspace = true
all-targets = true
exclude = ["botwork-ui-wasm"]
exclude-files = [
  "db/entity/src/*",
  "db/migration/src/*",
  "*/main.rs",
  "ui/wasm/src/api.rs",
  "ui/wasm/src/pages/mod.rs",
]
out = ["Lcov"]
output-dir = "coverage"
